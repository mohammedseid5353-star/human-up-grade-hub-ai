<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#050814,#0b1220);
    color:white;
}

.header{
    padding:15px;
    background:rgba(255,255,255,0.05);
    text-align:center;
}

.container{
    padding:20px;
    text-align:center;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    margin:10px;
    border-radius:10px;
    display:inline-block;
    width:200px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
    <h2>🛠 Admin Dashboard</h2>
</div>

<div class="container">

    <div class="card">
        <h3>👤 Users</h3>
        <p id="users">0</p>
    </div>

    <div class="card">
        <h3>💬 Status</h3>
        <p id="status">Online</p>
    </div>

    <div class="card">
        <h3>🚀 Server</h3>
        <p>Running</p>
    </div>

    <br><br>
    <button onclick="clearUsers()">Clear Users</button>

</div>

<script>

// get users from localStorage (from login system)
function loadUsers(){
    let users = localStorage.getItem("user");

    if(users){
        document.getElementById("users").innerText = 1;
    } else {
        document.getElementById("users").innerText = 0;
    }
}

// clear users
function clearUsers(){
    localStorage.removeItem("user");
    alert("Users cleared!");
    loadUsers();
}

// init
loadUsers();

</script>

</body>
</html>
