<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#050814,#0b1220);
    color:white;
}

.header{
    padding:15px;
    background:rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
}

.container{
    padding:20px;
}

.chat-box{
    background:rgba(255,255,255,0.05);
    height:300px;
    overflow-y:auto;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

input{
    width:75%;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
    <div>👋 Welcome <span id="user"></span></div>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>🤖 AI Chat</h2>

<div class="chat-box" id="chat"></div>

<input type="text" id="msg" placeholder="Ask something...">
<button onclick="send()">Send</button>

</div>

<script>

// show user
document.getElementById("user").innerText = localStorage.getItem("user") || "Guest";

// logout
function logout(){
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

// API URL (Render live server)
const API_URL = "https://human-up-grade-hub-ai-1.onrender.com/chat";

async function send(){

    let msg = document.getElementById("msg").value;
    let chat = document.getElementById("chat");

    if(!msg) return;

    chat.innerHTML += "<div>👤 You: " + msg + "</div>";

    try {
        let res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: msg })
        });

        let data = await res.json();

        chat.innerHTML += "<div>🤖 AI: " + data.reply + "</div>";

    } catch(error){
        chat.innerHTML += "<div>❌ Server not connected</div>";
    }

    document.getElementById("msg").value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
